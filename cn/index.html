    // ==========================================
    // 🚀 核心组件：交互式拟真蒲公英粒子引擎 (支持日夜双主题自动变色)
    // ==========================================
    const InteractiveBackground = ({ isDarkMode }) => {
      const canvasRef = useRef(null);
      const isDarkModeRef = useRef(isDarkMode);

      // 同步最新主题状态给 canvas 渲染循环，避免重新初始化粒子
      useEffect(() => {
        isDarkModeRef.current = isDarkMode;
      }, [isDarkMode]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return; 
        const ctx = canvas.getContext('2d');
        
        let animationFrameId;
        let particles = [];
        let mouse = { x: -1000, y: -1000, isDown: false };
        let gatheredCount = 0;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          initParticles();
        };

        const initParticles = () => {
          particles = [];
          const isMobile = window.innerWidth < 768;
          const density = isMobile ? 9000 : 6000; 
          const numParticles = Math.floor((window.innerWidth * window.innerHeight) / density);
          
          for (let i = 0; i < numParticles; i++) {
            particles.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              size: Math.random() * (isMobile ? 1.2 : 1.5) + 1,
              vx: (Math.random() - 0.5) * 0.8,
              vy: Math.random() * -1 - 0.3, 
              alpha: Math.random() * 0.5 + 0.3, 
              targetAngle: Math.random() * Math.PI * 2,
              targetRadius: Math.random() * 50 + 10,
              isGathered: false
            });
          }
        };

        const handleMouseMove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
        const handleMouseDown = () => { mouse.isDown = true; };
        const handleMouseUp = () => { mouse.isDown = false; };
        const handleTouchStart = (e) => {
          if (e.touches && e.touches.length > 0) {
            mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.isDown = true;
          }
        };
        const handleTouchMove = (e) => {
          if (e.touches && e.touches.length > 0) {
            mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
          }
        };
        const handleTouchEnd = () => { mouse.isDown = false; mouse.x = -1000; };

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mouseup', handleMouseUp);
        window.addEventListener('touchstart', handleTouchStart);
        window.addEventListener('touchmove', handleTouchMove);
        window.addEventListener('touchend', handleTouchEnd);

        resize();

        const render = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          gatheredCount = 0;
          
          // 动态获取当前主题色
          const dark = isDarkModeRef.current;

          particles.forEach(p => {
            let dx = mouse.x - p.x;
            let dy = mouse.y - p.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 280) {
              if (mouse.isDown) {
                p.vx -= (dx / distance) * (Math.random() * 12 + 4);
                p.vy -= (dy / distance) * (Math.random() * 12 + 4);
                p.isGathered = false;
              } else {
                let tx = mouse.x + Math.cos(p.targetAngle) * p.targetRadius;
                let ty = mouse.y + Math.sin(p.targetAngle) * p.targetRadius;
                p.vx += (tx - p.x) * 0.04;
                p.vy += (ty - p.y) * 0.04;
                if (Math.abs(tx - p.x) < 8 && Math.abs(ty - p.y) < 8) {
                  p.isGathered = true;
                  gatheredCount++;
                }
              }
            } else {
              p.isGathered = false;
            }

            p.vx *= 0.92;
            p.vy *= 0.92;

            if (!p.isGathered) {
              p.y += p.vy - 0.4;
              p.x += p.vx + Math.sin(p.y * 0.015) * 0.5; 
            } else {
              p.x += p.vx;
              p.y += p.vy;
            }

            if (p.y < -30) { p.y = canvas.height + 30; p.x = Math.random() * canvas.width; p.vx = 0; p.vy = 0; }
            if (p.y > canvas.height + 30) { p.y = -30; }
            if (p.x < -30) p.x = canvas.width + 30;
            if (p.x > canvas.width + 30) p.x = -30;

            // 绘制粒子主体 (夜晚银白色，白天蓝紫色)
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = p.isGathered 
              ? (dark ? `rgba(255, 255, 255, 0.95)` : `rgba(79, 70, 229, 0.8)`) 
              : (dark ? `rgba(220, 220, 230, ${p.alpha})` : `rgba(99, 102, 241, ${p.alpha * 0.6})`);
            ctx.fill();

            if (!p.isGathered) {
              let topY = p.y - p.size * 4;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p.x, topY);
              ctx.moveTo(p.x, topY);
              ctx.lineTo(p.x - p.size * 2, topY - p.size * 1.5);
              ctx.moveTo(p.x, topY);
              ctx.lineTo(p.x + p.size * 2, topY - p.size * 1.5);
              ctx.moveTo(p.x, topY);
              ctx.lineTo(p.x, topY - p.size * 2);
              
              ctx.strokeStyle = dark ? `rgba(255, 255, 255, ${p.alpha * 0.6})` : `rgba(99, 102, 241, ${p.alpha * 0.4})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            } else if (p.isGathered && distance < 120) {
               ctx.beginPath();
               ctx.moveTo(p.x, p.y);
               ctx.lineTo(mouse.x, mouse.y);
               ctx.strokeStyle = dark ? `rgba(255, 255, 255, 0.4)` : `rgba(99, 102, 241, 0.2)`;
               ctx.lineWidth = 0.5;
               ctx.stroke();
            }
          });

          if (gatheredCount > 20 && !mouse.isDown) {
             ctx.beginPath();
             ctx.moveTo(mouse.x, mouse.y);
             let sway = Math.sin(Date.now() * 0.0015) * 15;
             ctx.quadraticCurveTo(mouse.x + sway, canvas.height * 0.8, mouse.x + sway * 2, canvas.height + 20);
             ctx.strokeStyle = dark ? `rgba(255, 255, 255, ${Math.min(gatheredCount/80, 0.6)})` : `rgba(129, 140, 248, ${Math.min(gatheredCount/80, 0.6)})`;
             ctx.lineWidth = 1.5;
             ctx.stroke();
          }

          animationFrameId = requestAnimationFrame(render);
        };
        render();

        return () => {
          window.removeEventListener('resize', resize);
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mousedown', handleMouseDown);
          window.removeEventListener('mouseup', handleMouseUp);
          window.removeEventListener('touchstart', handleTouchStart);
          window.removeEventListener('touchmove', handleTouchMove);
          window.removeEventListener('touchend', handleTouchEnd);
          cancelAnimationFrame(animationFrameId);
        };
      }, []);

      return <canvas ref={canvasRef} className="fixed inset-0 z-0 pointer-events-none transition-opacity duration-500" />;
    };

    // ==========================================
    // 🚀 知晓云与 AI 配置区
    // ==========================================
    const CLIENT_ID = '518f3a0d9f54509b4fa5';
    const aiApiKey = "sk-gjzyakonhvumcdbirrvpghlyplwyxbxqthsqefoaqonljkmw";

    const fetchWithRetry = async (url, options, retries = 3) => {
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(res => setTimeout(res, 1500));
        }
      }
    };

    const App = () => {

        } else {

        }
      }, [isDarkMode]);

      const [isDbReady, setIsDbReady] = useState(false);
      const [dbError, setDbError] = useState('');
      const [classesData, setClassesData] = useState({});
      const [studentsData, setStudentsData] = useState([]);
      const [currentClass, setCurrentClass] = useState(null);
      const [currentUser, setCurrentUser] = useState(''); 
      const [currentStudentId, setCurrentStudentId] = useState(''); 
      const [currentUserRole, setCurrentUserRole] = useState(''); 
      const [viewState, setViewState] = useState('lobby'); 
      const [activeTab, setActiveTab] = useState('ranking'); 
      
      const [newClassNameInput, setNewClassNameInput] = useState('');
      const [newClassAdminPwdInput, setNewClassAdminPwdInput] = useState('');
      const [newClassRoster, setNewClassRoster] = useState([]);
      const [isAiParsingRoster, setIsAiParsingRoster] = useState(false); 
      
      const [selectedClassToJoin, setSelectedClassToJoin] = useState('');
      const [loginRoleTab, setLoginRoleTab] = useState('student'); 
      const [userNameInput, setUserNameInput] = useState('');
      const [studentIdInput, setStudentIdInput] = useState('');
      const [adminPwdInput, setAdminPwdInput] = useState('');
      
      const [formName, setFormName] = useState('');
      const [formOriginalGrade, setFormOriginalGrade] = useState('');
      const [formBonusItems, setFormBonusItems] = useState([]);
      const [isReadOnly, setIsReadOnly] = useState(false); 
      const [aiRulesText, setAiRulesText] = useState('');
      const [pdfFile, setPdfFile] = useState({ name: '', base64: '', mimeType: '' });
      const [isBatching, setIsBatching] = useState(false);
      const [batchProgress, setBatchProgress] = useState('');
      const [showInstructions, setShowInstructions] = useState(false);
      
      const [sdkReady, setSdkReady] = useState(false);
      const [sdkError, setSdkError] = useState('');

      const [isEditingRules, setIsEditingRules] = useState(false);
      const isEditingRulesRef = useRef(false);

      const fileInputRef = useRef(null);
      const currentClassRef = useRef(currentClass); 
      const [previewImage, setPreviewImage] = useState(null); 
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [confirmDialog, setConfirmDialog] = useState({ show: false, message: '', onConfirm: null });

      useEffect(() => { currentClassRef.current = currentClass; }, [currentClass]);
      useEffect(() => { isEditingRulesRef.current = isEditingRules; }, [isEditingRules]);

      useEffect(() => {
        const loadSDK = async () => {
          if (window.BaaS) {

          }
          const script = document.createElement('script');

        if (!window.BaaS) return;
        try {
          const classTable = new window.BaaS.TableObject('classes');

          const [cRes, sRes] = await Promise.all([
            classTable.limit(500).find(),

          ]);

      const compressImage = (file, callback, targetMaxWidth = 500, targetQuality = 0.3) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width; let height = img.height;
            if (width > targetMaxWidth) { height = Math.round((height * targetMaxWidth) / width); width = targetMaxWidth; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', targetQuality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      const currentStudents = useMemo(() => studentsData.filter(s => s.className === currentClass), [currentClass, studentsData]);
      const meData = useMemo(() => currentStudents.find(s => s.studentId === currentStudentId), [currentStudents, currentStudentId]);
      const isAppLocked = !isReadOnly && meData?.isAiProcessing === true;
      const isFormDisabled = isReadOnly || isAppLocked;

      const rankedStudents = useMemo(() => {
        if (currentStudents.length === 0) return [];
        const withRaw = currentStudents.map(s => ({
          ...s, rawBonus: s.bonusItems?.reduce((sum, item) => sum + (parseFloat(item.points) || 0), 0) || 0
        }));
        const maxRaw = Math.max(...withRaw.map(s => s.rawBonus), 0);
        return withRaw.map(s => {
          const scaled = maxRaw > 0 ? (s.rawBonus / maxRaw) * 3 : 0;
          const items = s.bonusItems || [];
          const isPending = items.some(i => !i.aiStatus || i.aiStatus === 'Pending');
          const hasAiWarning = items.some(i => i.aiStatus === 'Reject' || i.aiStatus === 'Manual Review');
          return {
            ...s, scaledBonus: scaled.toFixed(4),
            totalScore: (parseFloat(s.originalGrade || 0) + scaled).toFixed(2),
            isPending, hasAiWarning
          };
        }).sort((a, b) => b.totalScore - a.totalScore);
      }, [currentStudents]);

        setIsAiParsingRoster(true); showToast("正在智能提取名单，请稍候...", 'success');
        try {
          let textPayload = [];
          if (file.type.startsWith('image/')) {
            const b64 = await new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result); reader.readAsDataURL(file); });
            textPayload = [{ type: "text", text: "提取图片中的所有学生姓名和学号对。必须仅输出合法的 JSON 数组，形如 [{\"name\":\"张三\",\"studentId\":\"01\"}]。不要任何其他文字！强制要求使用键名 'name' 和 'studentId'！" }, { type: "image_url", image_url: { url: b64 } }];
          } else {
            const buffer = await file.arrayBuffer();
            const wb = XLSX.read(buffer);
            const csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);
            const safePrompt = "分析以下表格数据，提取所有的姓名和学号对。\n必须仅输出合法的 JSON 数组格式，不要有任何多余文字，必须使用键名 'name' 和 'studentId'：\n" + csv.substring(0, 10000);
            textPayload = [{ type: "text", text: safePrompt }];
          }
          const res = await fetchWithRetry(`https://api.siliconflow.cn/v1/chat/completions`, {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiApiKey}` },
            body: JSON.stringify({ model: "Qwen/Qwen3.5-4B", messages: [{ role: "user", content: textPayload }] })
          });
          
          let rawContent = res.choices?.[0]?.message?.content || "";
          let cleanContent = rawContent.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
          const jsonArrayMatch = cleanContent.match(/\[[\s\S]*\]/);
          let list = [];
          if (jsonArrayMatch) { list = JSON.parse(jsonArrayMatch[0]); } 
          else {
            cleanContent = cleanContent.replace(/```json/gi, '').replace(/```/g, '').trim();
            const parsed = JSON.parse(cleanContent);
            list = Array.isArray(parsed) ? parsed : (parsed.students || parsed.data || Object.values(parsed)[0] || []);
          }
          if (!Array.isArray(list)) list = [];
          const normalizedList = list.map(item => {
            const nameValue = item.name || item['姓名'] || item.Name || item.studentName || item['学生姓名'] || '';
            const idValue = item.studentId || item['学号'] || item.id || item.ID || item.studentNo || item.sno || '';
            return { name: String(nameValue).trim(), studentId: String(idValue).trim() };
          }).filter(item => item.name && item.studentId);
          if (normalizedList.length === 0) throw new Error("未找到人员数据");
          setNewClassRoster(normalizedList);
          showToast(`成功导入 ${normalizedList.length} 名学生名单`, 'success');
        } catch (error) { showToast("解析失败", 'error'); } finally { setIsAiParsingRoster(false); e.target.value = ''; }
      };

      const handleCreateClass = async () => {

        try {
          await new window.BaaS.TableObject('classes').create().set({
            name: cName, rulesText: "在此处编写细则即可", rulesPdfBase64: "", rulesPdfName: "", rulesFileMimeType: "application/pdf", adminPwd: newClassAdminPwdInput.trim(), roster: newClassRoster
          }).save();
          setNewClassNameInput(''); setNewClassAdminPwdInput(''); setNewClassRoster([]);
          showToast("班级创建成功！", 'success'); fetchAllData();

              setClassesData(prev => { const n = { ...prev }; delete n[currentClass]; return n; });
              setStudentsData(prev => prev.filter(s => s.className !== currentClass));

      const handleSaveStudent = async () => {
        if (!formOriginalGrade) return showToast("原始成绩必填", 'error');
        try {

            isAiProcessing: false, modCount: (existing?.modCount || 0) + 1
          };
          if (new Blob([JSON.stringify(payload)]).size > 900 * 1024) return showToast("数据过大", 'error');
          const table = new window.BaaS.TableObject('students');
          if (existing?.id) await table.getWithoutData(existing.id).set(payload).update();
          else await table.create().set(payload).save();
          showToast(`保存成功！`, 'success'); fetchAllData(); setActiveTab('ranking');
        } catch (e) { showToast("保存失败", 'error'); }
      };

      const processAI = async (items, studentName) => {
        const updated = [...items];
        const rules = classesData[currentClass]?.rulesText || '';
        const pdf = classesData[currentClass]?.rulesPdfBase64 || '';
        for (let i = 0; i < updated.length; i++) {
          const it = updated[i];
          if (it.aiStatus !== 'Pending' && it.aiStatus) continue;
          if (!it.points || !it.description) continue;
          const prompt = `你是审核AI。\n学生:${studentName}\n细则:${rules}\n申请:${it.points}分; ${it.description}\n材料:${it.materialName?'已上传':'无'}\n核查所有违规点并在reason列出。如无特权且缺材料直接Reject。输出合法JSON: {"status":"Approve"|"Reject"|"Manual Review","reason":"详细依据"}`;
          try {
            const content = [{ type: "text", text: prompt }];
            if (pdf) content.push({ type: "image_url", image_url: { url: `data:${classesData[currentClass]?.rulesFileMimeType};base64,${pdf}` } });
            if (it.materialBase64) content.push({ type: "image_url", image_url: { url: it.materialBase64 } });
            const res = await fetchWithRetry(`https://api.siliconflow.cn/v1/chat/completions`, {
              method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiApiKey}` },
             body: JSON.stringify({ model: "Qwen/Qwen3.5-4B", messages: [{ role: "user", content: textPayload }] })
            });
            let clean = (res.choices?.[0]?.message?.content || "").replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
            const match = clean.match(/\{[\s\S]*\}/);
            let decision = match ? JSON.parse(match[0]) : JSON.parse(clean.replace(/```json/gi, '').replace(/```/g, '').trim());
            updated[i].aiStatus = decision.status; updated[i].aiReason = decision.reason;

                  ) : (
                    formBonusItems.map(item => (
                      <div key={item.id} className={`p-5 rounded-2xl border relative group transition-colors ${isFormDisabled ? 'bg-slate-50/30 dark:bg-slate-800/30 border-slate-200/50 dark:border-slate-700/50' : 'bg-white/80 dark:bg-slate-800/80 border-slate-200 dark:border-slate-600 shadow-sm dark:shadow-lg'}`}>
                        {!isFormDisabled && <button onClick={()=>setFormBonusItems(formBonusItems.filter(i=>i.id!==item.id))} className="absolute top-4 right-4 text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition-colors"><Trash2 className="w-5 h-5" /></button>}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-3 pr-8">
                          <div><label htmlFor={`points-${item.id}`} className="block text-xs text-slate-500 dark:text-slate-400 mb-1">申请分数</label><input id={`points-${item.id}`} name={`points-${item.id}`} type="number" step="0.01" value={item.points} onChange={e=>setFormBonusItems(formBonusItems.map(i=>i.id===item.id?{...i, points: e.target.value}:i))} disabled={isFormDisabled} className={`w-full px-3 py-2 rounded-lg border text-sm outline-none ${isFormDisabled?'bg-transparent border-transparent px-0 font-medium text-slate-800 dark:text-slate-300':'border-slate-300 dark:border-slate-600 focus:ring-1 focus:ring-indigo-500 bg-white/50 dark:bg-slate-900/60 text-slate-800 dark:text-white'}`} /></div>
                          <div><label htmlFor={`type-${item.id}`} className="block text-xs text-slate-500 dark:text-slate-400 mb-1">活动类型</label><input id={`type-${item.id}`} name={`type-${item.id}`} type="text" value={item.type} onChange={e=>setFormBonusItems(formBonusItems.map(i=>i.id===item.id?{...i, type: e.target.value}:i))} disabled={isFormDisabled} className={`w-full px-3 py-2 rounded-lg border text-sm outline-none ${isFormDisabled?'bg-transparent border-transparent px-0 font-medium text-slate-800 dark:text-slate-300':'border-slate-300 dark:border-slate-600 focus:ring-1 focus:ring-indigo-500 bg-white/50 dark:bg-slate-900/60 text-slate-800 dark:text-white'}`} /></div>
                          <div className="md:col-span-2"><label htmlFor={`desc-${item.id}`} className="block text-xs text-slate-500 dark:text-slate-400 mb-1">活动说明</label><input id={`desc-${item.id}`} name={`desc-${item.id}`} type="text" value={item.description} onChange={e=>setFormBonusItems(formBonusItems.map(i=>i.id===item.id?{...i, description: e.target.value}:i))} disabled={isFormDisabled} className={`w-full px-3 py-2 rounded-lg border text-sm outline-none ${isFormDisabled?'bg-transparent border-transparent px-0 font-medium text-slate-800 dark:text-slate-300':'border-slate-300 dark:border-slate-600 focus:ring-1 focus:ring-indigo-500 bg-white/50 dark:bg-slate-900/60 text-slate-800 dark:text-white'}`} /></div>
                        </div>
                        <div className={`flex flex-col md:flex-row gap-4 items-start justify-between mt-4 pt-4 border-t ${isFormDisabled ? 'border-slate-200/30 dark:border-slate-700/50' : 'border-slate-100 dark:border-slate-700'}`}>
                          <div className="flex flex-col gap-2">
                            {!isFormDisabled && <label htmlFor={`upload-${item.id}`} className="cursor-pointer px-3 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors flex items-center gap-2 text-sm text-slate-700 dark:text-slate-200 w-max shadow-sm"><UploadCloud className="w-4 h-4" />上传材料<input id={`upload-${item.id}`} name={`upload-${item.id}`} type="file" accept="image/*" className="hidden" onChange={e=>{const f=e.target.files[0];if(f){compressImage(f, b64=>{setFormBonusItems(formBonusItems.map(i=>i.id===item.id?{...i, materialName: f.name, materialBase64: b64, aiStatus: 'Pending', aiReason: ''}:i));});}}} /></label>}
                            {item.materialName ? <button onClick={()=>item.materialBase64 && setPreviewImage(item.materialBase64)} className="text-xs font-medium text-indigo-600 dark:text-indigo-300 bg-indigo-50/80 dark:bg-indigo-900/30 border border-transparent dark:border-indigo-500/20 px-2 py-1 rounded-md max-w-[200px] truncate flex items-center gap-1 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors w-max"><FileText className="w-3 h-3 flex-shrink-0"/>{item.materialName}</button> : <span className="text-xs text-slate-400 dark:text-slate-500">无材料</span>}
                          </div>
                          
                          {item.aiStatus && item.aiStatus !== 'Pending' && (
                            <div className="flex flex-col items-start md:items-end gap-2 w-full md:w-auto">
                              <div className={`text-xs font-bold px-3 py-1.5 rounded-lg border flex items-center gap-1.5 w-max shadow-sm ${item.aiStatus==='Approve'?'bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 border-green-200 dark:border-green-500/30':item.aiStatus==='Reject'?'bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300 border-red-200 dark:border-red-500/30':'bg-yellow-50 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300 border-yellow-200 dark:border-yellow-500/30'}`}>
                                {item.aiStatus==='Approve'?<CheckCircle className="w-4 h-4"/>:item.aiStatus==='Reject'?<AlertCircle className="w-4 h-4"/>:<Clock className="w-4 h-4"/>}
                                <span>{item.aiStatus==='Approve'?'✅ AI验证通过':item.aiStatus==='Reject'?'❌ 异常驳回':'⚠️ 存疑/需人工核实'}</span>
                              </div>
                              {(item.aiStatus === 'Reject' || item.aiStatus === 'Manual Review' || item.aiReason) && (
                                <div className={`text-xs px-3 py-2 rounded-lg max-w-full md:max-w-md border shadow-sm break-words whitespace-normal text-left leading-relaxed ${item.aiStatus === 'Approve' ? 'bg-green-50/50 dark:bg-green-900/20 text-green-600 dark:text-green-400 border-green-100 dark:border-green-500/20' : 'bg-red-50/80 dark:bg-red-900/20 text-red-600 dark:text-red-400 border-red-100 dark:border-red-500/20'}`}>
                                  <b className="font-semibold block mb-0.5">AI 裁定依据：</b>{item.aiReason || '未提供详细原因'}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      </div>
                    ))
                  )}
                </div>
                {!isFormDisabled && <div className="mt-8 flex justify-end pt-6 border-t border-slate-100 dark:border-slate-700"><button onClick={handleSaveStudent} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 dark:hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-medium shadow-md dark:shadow-lg dark:shadow-indigo-900/50 transition-all hover:scale-[1.02]"><Save className="w-5 h-5" /> 保存我的申报数据</button></div>}
              </div>
            )}

            {activeTab === 'ai-rules' && (
              <div className="bg-white/90 dark:bg-slate-800/60 backdrop-blur-xl rounded-3xl shadow-xl dark:shadow-2xl border border-white/60 dark:border-white/10 p-6 md:p-8 w-full relative transition-colors duration-500">
                <div className="flex items-center gap-3 mb-6 border-b border-slate-100 dark:border-slate-700 pb-4"><div className="p-2 bg-purple-100/80 dark:bg-purple-500/20 border border-transparent dark:border-purple-500/30 rounded-xl"><Sparkles className="w-6 h-6 text-purple-600 dark:text-purple-400" /></div><div><h2 className="text-xl font-bold text-slate-800 dark:text-white">班级 AI 智能审核配置</h2><p className="text-sm text-slate-500 dark:text-slate-400 mt-1">本班的所有同学都可以对 AI 审核规则进行补充。</p></div></div>
                <div className="mb-8">
                  <label htmlFor="rulesFileInput" className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">官方评分文件 (支持 PDF/图片)</label>
                  <div className="flex flex-col sm:flex-row sm:items-center gap-4">
                    <button onClick={() => fileInputRef.current?.click()} className="flex items-center justify-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm w-full sm:w-auto">
                      <UploadCloud className="w-4 h-4 text-slate-500 dark:text-slate-400" /> 选择/替换规则文件
                    </button>
                    <input id="rulesFileInput" name="rulesFileInput" type="file" accept="application/pdf, image/*" ref={fileInputRef} onChange={handleRuleFileUpload} className="hidden" />
                    {pdfFile.name ? (
                      <div className="flex items-center gap-2 px-3 py-1.5 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 border border-green-200 dark:border-green-500/30 rounded-lg text-sm w-max max-w-full shadow-sm">
                        <FileText className="w-4 h-4 flex-shrink-0" /> 
                        <span className="font-medium truncate max-w-[200px]">{pdfFile.name}</span>
                        <span className="text-xs bg-green-200/60 dark:bg-green-500/20 text-green-800 dark:text-green-200 px-1.5 py-0.5 rounded ml-2">已就绪</span>
                      </div>
                    ) : (<span className="text-sm text-slate-400 dark:text-slate-500">当前未上传任何文件。</span>)}
                  </div>
                </div>
                <div className="mb-6">
                  <label htmlFor="aiRulesTextInput" className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">文字补充说明 (所有人可编辑)</label>
                  <textarea id="aiRulesTextInput" name="aiRulesTextInput" rows="8" value={aiRulesText} onChange={e=>setAiRulesText(e.target.value)} onFocus={() => setIsEditingRules(true)} onBlur={() => setIsEditingRules(false)} className="w-full px-4 py-3 rounded-2xl border border-slate-300 dark:border-slate-600 focus:ring-2 focus:ring-purple-500 bg-white/50 dark:bg-slate-900/60 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-sm leading-relaxed outline-none transition-all shadow-inner" placeholder="在此处编写细则即可"></textarea>
                </div>
                <div className="flex justify-end pt-4 border-t border-slate-100 dark:border-slate-700"><button onClick={saveAiRules} className="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 dark:hover:bg-purple-500 text-white px-6 py-2.5 rounded-xl font-medium transition-colors shadow-md dark:shadow-lg dark:shadow-purple-900/50 hover:scale-[1.02]"><Save className="w-4 h-4" /> 保存 / 补充全局规则</button></div>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    /* 为表格添加自定义的滚动条，兼容黑白两套模式 */
    .custom-scrollbar::-webkit-scrollbar {
      height: 8px;
    }
    html.dark .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5); 
      border-radius: 4px;
    }
    html:not(.dark) .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(241, 245, 249, 0.8); 
      border-radius: 4px;
    }
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(71, 85, 105, 0.8); 
      border-radius: 4px;
    }
    html:not(.dark) .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(203, 213, 225, 0.8); 
      border-radius: 4px;
    }
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 1); 
    }
    html:not(.dark) .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 1); 
    }
  </style>
</body>
</html>
